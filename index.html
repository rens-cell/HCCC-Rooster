<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCCC Rooster 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --surface: #161a22; --surface2: #1e2330; --border: #2a3040;
  --text: #e8eaf0; --muted: #7a8294; --accent: #4f9cf9;
  --o: #FFC000; --o-bg: #FFC000;
  --mx: #FFFF00; --mx-bg: #FFFF00;
  --m: #A9D08E; --m-bg: #A9D08E;
  --n: #A6A6A6; --n-bg: #A6A6A6;
  --v: #FF0000; --v-bg: #FF0000;
  --x: #00B0F0; --x-bg: #00B0F0;
  --z: #FC36D2; --z-bg: #FC36D2;
  --e: #8DE3EB; --e-bg: #8DE3EB;
  --opl: #E2EFDA; --opl-bg: #E2EFDA;
  --f: #7030A0; --f-bg: #7030A0;
  --optie: #00B050; --optie-bg: #00B050;
  --today: #1a2d4a;
}
body.light {
  --bg: #d8dce8; --surface: #e4e7f0; --surface2: #cdd1df; --border: #b0b6c8;
  --text: #1a1d26; --muted: #52586a; --accent: #2563eb; --today: #bfc8e0;
}
body.light .tab { color: #111111; }
body.light .tab.active { color: #ffffff; }
body.light #modeBtn { color: #111111; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

/* HEADER */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 12px; display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 15px; font-weight: 600; white-space: nowrap; }
.logo span { color: var(--accent); }
.today-btn { background: var(--accent); color: #fff; border: none; padding: 5px 10px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; margin-left: auto; white-space: nowrap; }

/* TABS */
.tabs { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 5px 8px; gap: 6px; }
.tab { padding: 6px 14px; border: 1px solid var(--border); background: var(--surface2); color: #ffffff; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 8px; font-family: inherit; white-space: nowrap; }
.tab.active { color: #ffffff; background: var(--accent); border-color: var(--accent); font-weight: 700; }

/* CONTROLS */
.controls { padding: 6px 12px; display: flex; gap: 8px; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); }
.nav-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 28px; height: 28px; border-radius: 7px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.period-label { font-weight: 600; font-size: 13px; text-align: center; flex: 1; }
.filter-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 7px; font-size: 11px; font-family: inherit; cursor: pointer; max-width: 140px; }

/* CONTENT */
.content { padding: 10px; }

/* WEEK GRID — mobile: name col narrow, day cols auto */
.week-grid {
  display: grid;
  grid-template-columns: 72px repeat(7, 1fr);
  border-radius: 8px; overflow: hidden; border: 1px solid var(--border);
}
.week-header-cell {
  background: var(--surface2); padding: 5px 2px; text-align: center;
  font-size: 9px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.3px;
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.shift-cell.today-col { box-shadow: none; }
.shift-cell.today-col-last { box-shadow: none; }
.week-header-cell.today-hdr { background: var(--surface2); color: var(--text); box-shadow: none; }
.today-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 10;
  border-left: 3px solid #ffffff;
  border-right: 3px solid #ffffff;
}
.today-overlay-top {
  border-top: 3px solid #ffffff;
}
.today-overlay-last {
  border-bottom: 3px solid #ffffff;
}
.day-num { display: block; font-size: 15px; font-weight: 300; color: var(--text); margin-top: 1px; }
.today-hdr .day-num { color: var(--text); font-weight: 600; }
.name-cell {
  background: var(--surface); padding: 5px 6px;
  font-size: 11px; font-weight: 500;
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 5px; white-space: nowrap; overflow: hidden;
}
.avatar { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 600; flex-shrink: 0; }
.shift-cell {
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  text-align: center; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface);
}


.shift-badge {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%; font-size: 11px; font-weight: 900;
  font-family: 'DM Mono', monospace; letter-spacing: 0.3px;
}

/* MONTH GRID */
.month-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  border-radius: 8px; overflow: hidden; border: 1px solid var(--border);
}
.month-day-header {
  background: var(--surface2); padding: 5px 2px; text-align: center;
  font-size: 9px; font-weight: 600; color: var(--muted); text-transform: uppercase;
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.month-day {
  background: var(--surface); border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border); padding: 3px; min-height: 56px;
}
.month-day.empty { background: var(--bg); }
.month-day.today-day { background: var(--today); }
.month-day-num { font-size: 10px; font-weight: 600; color: var(--muted); margin-bottom: 2px; }
.month-day.today-day .month-day-num {
  color: var(--accent); background: rgba(79,156,249,0.15);
  width: 18px; height: 18px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center; font-size: 9px;
}
.month-shifts { display: flex; flex-direction: column; gap: 1px; }
.month-shift-row { display: flex; align-items: center; gap: 2px; }
.month-badge { border-radius: 2px; padding: 1px 3px; font-size: 8px; font-weight: 700; font-family: 'DM Mono', monospace; flex-shrink: 0; }
.month-name { color: var(--muted); font-size: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 34px; }

/* PERSONAL VIEW */
.personal-header { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
.personal-name { font-size: 18px; font-weight: 600; }
.stats-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; flex: 1; min-width: 60px; text-align: center; }
.stat-num { font-size: 18px; font-weight: 600; font-family: 'DM Mono', monospace; }
.stat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }
.upcoming-list { display: flex; flex-direction: column; gap: 5px; }
.upcoming-item {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 10px; display: flex; align-items: center; gap: 8px;
}
.upcoming-item.today-item { border-color: var(--accent); background: var(--today); }
.upcoming-date { font-size: 11px; width: 56px; flex-shrink: 0; color: var(--text); }
.today-item .upcoming-date { color: var(--accent); font-weight: 600; }
.upcoming-day { font-size: 11px; color: var(--text); width: 70px; flex-shrink: 0; }
.upcoming-shift { flex: 1; }
.upcoming-time { font-size: 10px; color: var(--text); }
.ubadge { display: inline-block; border-radius: 5px; padding: 3px 7px; font-size: 11px; font-weight: 600; }

/* TEAM TODAY */
.team-section-label { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.3px; margin-bottom: 8px; margin-top: 14px; padding: 6px 0 4px; border-bottom: 1px solid var(--border); }
.team-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
.team-card { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; min-width: 130px; flex: 1; }
.tc-badge { border-radius: 6px; padding: 5px 10px; font-size: 14px; font-weight: 700; font-family: 'DM Mono', monospace; flex-shrink: 0; }
.tc-name { font-size: 15px; font-weight: 600; }
.tc-time { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* LEGEND */
.legend { display: flex; gap: 6px 10px; flex-wrap: wrap; padding: 8px 12px; border-top: 1px solid var(--border); background: var(--surface); }
.legend-item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: var(--muted); }
.legend-badge { border-radius: 3px; padding: 1px 4px; font-size: 9px; font-weight: 700; font-family: 'DM Mono', monospace; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 1000; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px; width: 88%; max-width: 340px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.modal-date { font-size: 13px; color: #ffffff; margin-bottom: 8px; }
.modal-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.modal-time { font-size: 15px; color: #ffffff; margin-bottom: 18px; font-family: 'DM Mono', monospace; }
.modal-name { font-size: 18px; font-weight: 600; color: #ffffff; margin-bottom: 6px; }
.modal-close {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 10px; border-radius: 8px;
  font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="setView('team',this)">Vandaag</button>
  <button class="tab" onclick="setView('week',this)">Week</button>
  <button class="tab" onclick="setView('personal',this)">Diensten</button>
  <button id="modeBtn" onclick="toggleMode()" style="background:none;border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:7px;font-size:18px;cursor:pointer;line-height:1;flex-shrink:0;margin-left:auto;margin-right:6px">🌙</button>
</div>

<div class="controls">
  <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">

  </div>

    <select class="filter-select" id="personSelect" onchange="onPersonChange()">
      <option value="">Alle medewerkers</option>
    </select>
  </div>
</div>

<div class="content" id="mainContent"></div>

<div class="legend">

  <div class="legend-item"><span class="legend-badge" style="background:var(--opl-bg);color:var(--opl)">OPL</span>Opleiding</div>
</div>

const ds = d => { const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${day}`; };
const todayStr = () => ds(new Date());
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
function monday(d){ const day=d.getDay(), r=new Date(d); r.setDate(d.getDate()+(day===0?-6:1-day)); return r; }
function weekNum(d){
  const t=new Date(d); t.setHours(0,0,0,0);
  t.setDate(t.getDate()+3-(t.getDay()+6)%7);
  const w=new Date(t.getFullYear(),0,4);
  return 1+Math.round(((t-w)/86400000-3+(w.getDay()+6)%7)/7);
}

function si(code){
  if(!code) return null;
  const c=code.trim().toLowerCase().replace(/\.$/,'').replace(/,$/,'');
  return SHIFTS[c]||{label:code,short:code.slice(0,3).toUpperCase(),solid:'#555555',time:''};
}
function hexLuma(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 0.299*r+0.587*g+0.114*b;
}
function contrastText(hex){
  return hexLuma(hex)>140?'#111111':'#ffffff';
}
function badge(code){
  const s=si(code); if(!s) return '';
  const bg=s.solid||'#555555';
  const fg=contrastText(bg);
  const fw=s.bold===false?'400':'900';
  return `<span class="shift-badge" style="color:${fg};background:${bg};font-weight:${fw}">${s.short}</span>`;
}
function avatarEl(name,sz){
  const colors=['#4f9cf9','#f5a623','#48c78e','#b07ef5','#f87171','#fb923c','#e879f9','#34d399'];
  const c=colors[name.charCodeAt(0)%colors.length];
  const ini=name.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
  return `<span class="avatar" style="background:${c}22;color:${c};width:${sz||20}px;height:${sz||20}px">${ini}</span>`;
}
function visible(){ return selectedPerson?[selectedPerson]:employees; }

function setView(v,el){
  currentView=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

  const calBtn=document.getElementById('calBtn');
  if(calBtn) calBtn.style.display = v==='week' ? 'inline-block' : 'none';
  const ps=document.getElementById('personSelect');
  if(ps) ps.style.display = v==='personal' ? 'block' : 'none';
  render();
}
function navigate(dir){
  if(currentView==='week') currentDate=addDays(currentDate,dir*7);
  else if(currentView==='month') currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+dir,1);
  else if(currentView==='personal') currentDate=addDays(currentDate,dir*14);
  else currentDate=addDays(currentDate,dir);

}

leertraject Bibin Rabobank", "2026-04-14": "Inleertraject Binbin", "2026-04-16": "Optioneel naar behoefte inleertraject Binbin Rabobank", "2026-04-30": "Rabobank Meppel", "2026-05-01": "Rowena werkt tot 12 uur"}, "Binbin": {"2026-03-16": "werkt tot 16:00", "2026-03-17": "werkt tot 16:00", "2026-03-19": "werkt tot 12:00"}, "Esther van Santen": {"2026-04-20": "Inleertraject telefonie Binbin", "2026-04-21": "Inleertraject Binbin telefonie - Belscript"}};
function showShift(name, dateStr, code) {
  const s = si(code);
  if (!s) return;
  const d = new Date(dateStr + 'T00:00:00');
  const dayLabel = DAYS_NL[d.getDay()];
  const dateLabel = d.getDate() + ' ' + MONTHS_FULL[d.getMonth()] + ' ' + d.getFullYear();
  document.getElementById('modalDate').textContent = dayLabel + ' ' + dateLabel;
  document.getElementById('modalTitle').textContent = s.label;
  let shiftTime = s.time || '–';
  if (code === 'mx') {
    const dow = d.getDay(); // 0=sun, 6=sat
    shiftTime = (dow === 0 || dow === 6) ? '09:00–17:30' : '10:30–19:00';
  }
  document.getElementById('modalTime').textContent = shiftTime;
  document.getElementById('modalName').textContent = name;
  // color the title with shift color
  const bg = s.solid || '#555';
  const fg = contrastText(bg);
  document.getElementById('modal').style.borderColor = bg;
  document.getElementById('modalTitle').style.color = bg;
  const role = ROLES[name] || '';
  const roleEl = document.getElementById('modalRole');
  if (roleEl) { roleEl.textContent = role; }
  const note = (NOTES[name] && NOTES[name][dateStr]) || '';
  const noteEl = document.getElementById('modalNote');
  if (noteEl) {
    if (note) {
      noteEl.textContent = '📝 ' + note;
      noteEl.style.display = 'block';
    } else {
      noteEl.textContent = '';
      noteEl.style.display = 'none';
    }
  }
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

// ── DATE PICKER ──
let dpYear, dpMonth;
function openDatePicker(){
  dpYear=currentDate.getFullYear(); dpMonth=currentDate.getMonth();
  renderDpGrid();
  const el=document.getElementById('datePickerOverlay');
  el.style.display='flex';
}
function closeDatePicker(e){
  if(!e||e.target===document.getElementById('datePickerOverlay'))
    document.getElementById('datePickerOverlay').style.display='none';
}
function dpNav(dir){ dpMonth+=dir; if(dpMonth>11){dpMonth=0;dpYear++;} if(dpMonth<0){dpMonth=11;dpYear--;} renderDpGrid(); }
function renderDpGrid(){
  document.getElementById('dpTitle').textContent=MONTHS_FULL[dpMonth].charAt(0).toUpperCase()+MONTHS_FULL[dpMonth].slice(1)+' '+dpYear;
  const first=new Date(dpYear,dpMonth,1), last=new Date(dpYear,dpMonth+1,0);
  let off=first.getDay(); if(off===0) off=7; off--;
  const t=todayStr(), sel=ds(currentDate);
  let h='';
  for(let i=0;i<off;i++) h+='<div></div>';
  for(let d=1;d<=last.getDate();d++){
    const dstr=ds(new Date(dpYear,dpMonth,d));
    const isT=dstr===t, isSel=dstr===sel;
    const bg=isSel?'var(--accent)':isT?'rgba(79,156,249,0.2)':'var(--surface2)';
    const col=isSel?'#fff':isT?'var(--accent)':'var(--text)';
    h+=`<div onclick="dpSelect('${dstr}')" style="text-align:center;padding:5px 2px;border-radius:6px;background:${bg};color:${col};font-size:13px;cursor:pointer;font-weight:${isT||isSel?'700':'400'}">${d}</div>`;
  }
  document.getElementById('dpGrid').innerHTML=h;
}
function dpSelect(dstr){
  const parts=dstr.split('-');
  currentDate=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  document.getElementById('datePickerOverlay').style.display='none';
  render();
}

// ── SWIPE ──
(function(){
  let tx=0, moved=false;
  const el=document.getElementById('mainContent');
  el.addEventListener('touchstart',e=>{ tx=e.touches[0].clientX; moved=false; },{passive:true});
  el.addEventListener('touchmove',e=>{ if(Math.abs(e.touches[0].clientX-tx)>10) moved=true; },{passive:true});
  el.addEventListener('touchend',e=>{
    if(!moved) return;
    const dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)<40) return;
    if(currentView==='week'||currentView==='team') navigate(dx<0?1:-1);
  },{passive:true});
})();

function render(){ if(currentView==='week') renderWeek(); else if(currentView==='month') renderMonth(); else if(currentView==='personal') renderPersonal(); else renderTeam(); }

function renderWeek(){
  const mon=monday(currentDate);
  const days=Array.from({length:7},(_,i)=>addDays(mon,i));
  const t=todayStr(), vis=visible();
  document.getElementById('periodLabel').innerHTML=`<span style='color:var(--muted);font-size:11px;font-weight:500'>week ${weekNum(mon)}</span> <span style='color:var(--border)'>|</span> ${days[0].getDate()} – ${days[6].getDate()} ${MONTHS_NL[days[6].getMonth()]}`;

  let h='<div class="week-grid">';
  // corner
  h+='<div class="week-header-cell" style="text-align:left;padding-left:6px;font-size:9px">Naam</div>';
  days.forEach(d=>{
    const isT=ds(d)===t;
    h+=`<div class="week-header-cell${isT?' today-hdr':''}" style="position:relative">${DAYS_NL[d.getDay()].toUpperCase()}<span class="day-num">${d.getDate()}</span>${isT?'<span class="today-overlay today-overlay-top"></span>':''}</div>`;
  });
  vis.forEach(name=>{
    const shifts=ROSTER[name]||{};
    h+=`<div class="name-cell"><span style="overflow:hidden;text-overflow:ellipsis">${name.split(' ')[0]}</span></div>`;
    days.forEach(d=>{
      const dstr=ds(d), shift=shifts[dstr], isT=dstr===t;
      const isLast = (vis.indexOf(name) === vis.length - 1);
      const todayClass = isT ? (isLast ? ' today-col today-col-last' : ' today-col') : '';
      const todayOverlay = isT ? `<span class="today-overlay${isLast?' today-overlay-last':''}"></span>` : '';
      const hasNote = shift && NOTES[name] && NOTES[name][dstr];
      const noteDot = hasNote ? '<span style="position:absolute;top:0px;right:2px;font-size:14px;font-weight:900;color:#fff;z-index:11;pointer-events:none;line-height:1;text-shadow:0 0 4px #000,0 0 4px #000">!</span>' : '';
      h+=`<div class="shift-cell${todayClass}" style="position:relative${shift?';cursor:pointer':''}" ${shift?`onclick="showShift('${name.replace(/'/g,"\\'")}','${dstr}','${shift}')"`:''}}>${shift?badge(shift):''}${todayOverlay}${noteDot}</div>`;
    });
  });
  h+='</div>';
  document.getElementById('mainContent').innerHTML=h;
}

function renderMonth(){
  const yr=currentDate.getFullYear(), mo=currentDate.getMonth(), t=todayStr(), vis=visible();
  document.getElementById('periodLabel').textContent=`${MONTHS_FULL[mo].charAt(0).toUpperCase()+MONTHS_FULL[mo].slice(1)} ${yr}`;
  const first=new Date(yr,mo,1), last=new Date(yr,mo+1,0);
  let off=first.getDay(); if(off===0) off=7; off--;
  let h='<div class="month-grid">';
  ['Ma','Di','Wo','Do','Vr','Za','Zo'].forEach(d=>h+=`<div class="month-day-header">${d}</div>`);
  for(let i=0;i<off;i++) h+='<div class="month-day empty"></div>';
  for(let day=1;day<=last.getDate();day++){
    const dstr=ds(new Date(yr,mo,day)), isT=dstr===t;
    let numHtml=isT?`<div class="month-day-num" style="color:var(--accent);background:rgba(79,156,249,0.15);width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center">${day}</div>`:`<div class="month-day-num">${day}</div>`;
    let rows=''; let cnt=0;
    vis.forEach(name=>{
      if(cnt>=4) return;
      const shift=(ROSTER[name]||{})[dstr]; if(!shift) return;
      const s=si(shift);
      rows+=`<div class="month-shift-row"><span class="month-badge" style="color:${contrastText(s.solid||'#555')};background:${s.solid||'#555'};font-weight:${s.bold===false?'400':'700'}">${s.short}</span><span class="month-name">${name.split(' ')[0]}</span></div>`;
      cnt++;
    });
    const total=vis.filter(n=>(ROSTER[n]||{})[dstr]).length;
    if(total>4) rows+=`<div style="font-size:8px;color:var(--muted)">+${total-4}</div>`;
    h+=`<div class="month-day${isT?' today-day':''}">${numHtml}<div class="month-shifts">${rows}</div></div>`;
  }
  const tot=off+last.getDate(); for(let i=0;i<(7-(tot%7))%7;i++) h+='<div class="month-day empty"></div>';
  h+='</div>';
  document.getElementById('mainContent').innerHTML=h;
}

function renderPersonal(){
  const person=selectedPerson||employees[0], shifts=ROSTER[person]||{}, t=todayStr();
  document.getElementById('periodLabel').innerHTML=`<span style='color:var(--muted);font-size:11px;font-weight:500'>Volledig rooster 2026</span>`;
  let counts={o:0,m:0,mx:0,n:0,v:0,z:0};
  Object.entries(shifts).forEach(([d,s])=>{ if(d>='2026-01-01'&&d<='2026-12-31'){ const k=s.trim().toLowerCase().replace(/\.$/,''); if(counts[k]!==undefined) counts[k]++; } });
  let h=`<div class="personal-header">${avatarEl(person,32)}<div><div class="personal-name">${person}</div><div style="font-size:11px;color:var(--muted)">Rooster 2026</div></div></div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" style="color:var(--o)">${counts.o}</div><div class="stat-label">Ochtend</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--m)">${counts.m}</div><div class="stat-label">Middag</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--mx)">${counts.mx}</div><div class="stat-label">MX</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--n)">${counts.n}</div><div class="stat-label">Nacht</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--v)">${counts.v}</div><div class="stat-label">Vrij</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--z)">${counts.z}</div><div class="stat-label">Ziek</div></div>
  </div>
  <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Komende 2 weken</div>
  <div class="upcoming-list">`;
  // Get all dates with shifts, sorted, starting from today
  const allDates = Object.keys(shifts).sort().filter(d => d >= t);
  for(let i=0;i<allDates.length;i++){
    const dstr=allDates[i];
    const parts=dstr.split('-'), d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
    const shift=shifts[dstr], isT=dstr===t, s=shift?si(shift):null;
    h+=`<div class="upcoming-item${isT?' today-item':''}">      <span class="upcoming-date">${d.getDate()} ${MONTHS_NL[d.getMonth()]}</span>      <span class="upcoming-day" style="width:70px">${DAYS_FULL[d.getDay()]}</span>      <span class="upcoming-shift">${s?`<span class="ubadge" style="color:${contrastText(s.solid||'#555')};background:${s.solid||'#555'};font-weight:${s.bold===false?'400':'700'}">${s.label}</span>`:'<span style="color:var(--muted);font-size:11px">–</span>'}</span>      ${s&&s.time?`<span class="upcoming-time">${s.time}</span>`:''}    </div>${(NOTES[person]&&NOTES[person][dstr])?`<div style="font-size:11px;color:#ffdd88;padding:2px 12px 6px;font-style:italic">! ${NOTES[person][dstr]}</div>`:''}`;
  }
  h+='</div>';
  document.getElementById('mainContent').innerHTML=h;
  // scroll today into view
  const todayEl=document.querySelector('.today-item');
  if(todayEl) setTimeout(()=>todayEl.scrollIntoView({block:'center',behavior:'smooth'}),50);
}

function renderTeam(){
  const d=currentDate, dstr=ds(d);
  document.getElementById('periodLabel').innerHTML=`<span style='color:var(--muted);font-size:11px;font-weight:500'>week ${weekNum(d)}</span> <span style='color:var(--border)'>|</span> ${DAYS_NL[d.getDay()]} ${d.getDate()} ${MONTHS_NL[d.getMonth()]} ${d.getFullYear()}`;
  const groups={o:[],mx:[],m:[],n:[],x:[],v:[],z:[],other:[]};
  employees.forEach(name=>{ const shift=(ROSTER[name]||{})[dstr]; if(!shift) return; const k=shift.trim().toLowerCase().replace(/\.$/,''); (groups[k]||groups.other).push({name,shift}); });
  const labels={o:'🐓 Ochtend (05:45–14:15)',mx:'🌤️ MX (10:30–19:00)',m:'☀️ Middag (13:45–22:15)',n:'🌙 Nacht (21:45–06:15)',x:'💼 Dagdienst',v:'⛺ Vrij',z:'🤒 Ziek',other:'📋 Overig'};
  let h='', any=false;
  ['o','mx','m','n','other','x','v','z'].forEach(k=>{ const ppl=groups[k]; if(!ppl.length) return; any=true;
    h+=`<div class="team-section-label">${labels[k]}</div><div class="team-grid">`;
    ppl.forEach(({name,shift})=>{ const ss=si(shift); const mxTime = (shift==='mx'||shift==='mx.') ? ((d.getDay()===0||d.getDay()===6)?'09:00–17:30':'10:30–19:00') : ss.time;
      const tNote=NOTES[name]&&NOTES[name][dstr];
      h+=`<div class="team-card"><span class="tc-badge" style="color:${contrastText(ss.solid||'#555')};background:${ss.solid||'#555'};font-weight:${ss.bold===false?'400':'700'}">${ss.short}</span><div><div class="tc-name">${name.split(' ')[0]}</div>${mxTime?`<div class="tc-time">${mxTime}</div>`:''  }${tNote?`<div style="font-size:10px;color:#ffdd88;font-style:italic;margin-top:2px">! ${tNote}</div>`:''}</div></div>`; });
    h+='</div>';
  });
  if(!any) h='<div style="padding:30px;text-align:center;color:var(--muted);font-size:15px">Geen diensten gepland</div>';
  document.getElementById('mainContent').innerHTML=h;
}

function toggleMode(){
  const body = document.body;
  const btn = document.getElementById('modeBtn');
  if(body.classList.contains('light')){
    body.classList.remove('light');
    btn.textContent = '🌙';
    try{ localStorage.setItem('hccc-mode','dark'); }catch(e){}
  } else {
    body.classList.add('light');
    btn.textContent = '☀️';
    try{ localStorage.setItem('hccc-mode','light'); }catch(e){}
  }
}
// restore saved preference
try{
  if(localStorage.getItem('hccc-mode')==='light'){
    document.body.classList.add('light');
    document.getElementById('modeBtn').textContent='☀️';
  }
}catch(e){}

render();
