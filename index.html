<style>
:root {
  --bg:#0d0f14;--surface:#161a22;--surface2:#1e2330;--border:#2a3040;
  --text:#e8eaf0;--muted:#7a8294;--accent:#4f9cf9;--today:#1a2d4a;
}
body.light {
  --bg:#d8dce8;--surface:#e4e7f0;--surface2:#cdd1df;--border:#b0b6c8;
  --text:#1a1d26;--muted:#52586a;--accent:#2563eb;--today:#bfc8e0;
}
body.light .tab {color:#ffffff;background:#0d2254;border-color:#0d2254;}
body.light .tab.active {color:#ffffff;background:#0d2254;border-color:#0d2254;box-shadow:inset 0 0 0 2px #FFC000;}
body.light #modeBtn {color:#FFC000;border-color:#1a3a7a;background:#0d2254;}
body.light #todayBtn2 {color:#FFC000;border-color:#1a3a7a;background:#0d2254;}
body.light .name-cell {color:#111 !important;}
body.light .week-header-cell {color:#111 !important;}
body.light .day-num {color:#111 !important;}
body.light .upcoming-date {color:#111 !important;}
body.light .upcoming-day {color:#111 !important;}
body.light .upcoming-time {color:#111 !important;}
body.light .tc-name {color:#111 !important;}
body.light .tc-time {color:#111 !important;}
body.light .team-section-label {color:#111 !important;}
body.light .period-label {color:#fff !important;}
body.light .nav-btn {color:#0d2254 !important;background:#FFC000 !important;border-color:#FFC000 !important;}
body.light .filter-select {color:#111 !important;}
body.light .stat-label {color:#52586a !important;}
body.light .modal-name, body.light #modalDate, body.light #modalTime, body.light #modalRole {color:#111 !important;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

/* NAV */
.tabs{background:#0d2254;border-bottom:none;display:flex;align-items:center;padding:5px 8px;gap:6px;position:sticky;top:0;z-index:100;}
.nav-group{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.tab{flex:1;padding:7px 4px;border:1px solid #0d2254;background:#0d2254;color:#ffffff;font-size:14px;font-weight:600;cursor:pointer;border-radius:8px;font-family:inherit;text-align:center;}
.tab.active{color:#ffffff;background:#0d2254;border-color:#0d2254;font-weight:700;box-shadow:inset 0 0 0 2px #FFC000;}
#modeBtn{background:none;border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:8px;font-size:16px;cursor:pointer;line-height:1;flex-shrink:0;margin-left:auto;}
#todayBtn{background:none;border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:8px;font-size:16px;cursor:pointer;line-height:1;flex-shrink:0;}

/* CONTROLS */
.controls{padding:10px 14px;display:flex;align-items:center;gap:0;background:#0d2254;border-bottom:2px solid #FFC000;}

.nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:9px;font-size:22px;background:#FFC000;border-color:#FFC000;color:#0d2254;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.period-label{font-weight:700;font-size:16px;text-align:center;cursor:pointer;user-select:none;color:#fff;padding:0 4px;white-space:nowrap;}
.filter-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:7px;font-size:11px;font-family:inherit;cursor:pointer;max-width:140px;margin-left:auto;}

/* CONTENT */
.content{padding:10px;}

/* WEEK */
.week-grid{display:grid;grid-template-columns:minmax(80px,max-content) repeat(7,1fr);border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.week-header-cell{background:var(--surface2);padding:3px 2px;text-align:center;font-size:13px;font-weight:700;color:#ffffff;text-transform:uppercase;border-right:1px solid var(--border);border-bottom:1px solid var(--border);position:relative;}
.week-header-cell.today-hdr{background:var(--surface2);color:var(--text);}
.day-num{display:block;font-size:13px;font-weight:600;color:#ffffff;margin-top:0;}
.today-hdr .day-num{font-weight:600;}
.name-cell{background:var(--surface);padding:3px 8px;font-size:14px;font-weight:700;color:#ffffff;border-right:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;white-space:nowrap;}
.shift-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);height:30px;display:flex;align-items:center;justify-content:center;background:var(--surface);position:relative;}
.shift-badge{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:12px;font-family:'DM Mono',monospace;}
.today-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10;border-left:3px solid #fff;border-right:3px solid #fff;}
.today-overlay-top{border-top:3px solid #fff;}
.today-overlay-last{border-bottom:3px solid #fff;}

/* PERSONAL */
.stats-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;flex:1;min-width:60px;text-align:center;}
.stat-num{font-size:18px;font-weight:600;font-family:'DM Mono',monospace;}
.stat-label{font-size:10px;color:var(--muted);margin-top:1px;}
.upcoming-list{display:flex;flex-direction:column;gap:5px;}
.upcoming-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;flex-wrap:nowrap;cursor:pointer;}
.upcoming-item.today-item{border-color:var(--accent);background:var(--today);}
.upcoming-date{font-size:13px;width:62px;flex-shrink:0;color:#ffffff;font-weight:500;}
.today-item .upcoming-date{color:var(--accent);font-weight:600;}
.upcoming-day{font-size:13px;color:#ffffff;width:76px;flex-shrink:0;font-weight:500;}
.upcoming-shift{flex:1;}
.upcoming-time{font-size:13px;color:#ffffff;font-weight:500;min-width:90px;text-align:center;flex-shrink:0;}
.ubadge{display:inline-block;border-radius:5px;padding:5px 12px;font-size:14px;font-weight:700;}

/* TEAM */
.team-section-label{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;margin-top:14px;padding:6px 0 4px;border-bottom:1px solid var(--border);}
.team-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.team-card{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;min-width:130px;flex:1;cursor:pointer;}
.tc-badge{border-radius:6px;padding:6px 12px;font-size:16px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0;}
.tc-name{font-size:15px;font-weight:600;}
.tc-time{font-size:12px;color:#ffffff;margin-top:2px;}






/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;width:88%;max-width:340px;}
.modal-close{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:4px;}

/* DATE PICKER */
.dp-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;align-items:center;justify-content:center;}
.dp-overlay.open{display:flex;}
.dp-modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;width:300px;max-width:92vw;}
.dp-day{cursor:pointer;padding:7px 2px;border-radius:6px;font-size:13px;text-align:center;}
.dp-day:hover{background:var(--surface2);}
</style>
</head>

  if(ctrl) ctrl.style.display=v==='personal'?'none':'flex';
  const ph=document.getElementById('personalHeader');
  if(ph) ph.style.display=v==='personal'?'block':'none';
  if(v==='personal') showEmpPicker();
  else render();
}
function navigate(dir){
  if(currentView==='week') currentDate=addDays(currentDate,dir*7);
  else if(currentView==='personal') currentDate=addDays(currentDate,dir*14);
  else currentDate=addDays(currentDate,dir);
  render();
}
function goToday(){currentDate=new Date();render();}
function onPersonChange(){selectedPerson=document.getElementById('personSelect').value;render();}
function render(){if(currentView==='week') renderWeek();else if(currentView==='personal') renderPersonal();else renderTeam();}

/* ===== WEEK ===== */
function renderWeek(){
  const mon=monday(currentDate),days=Array.from({length:7},(_,i)=>addDays(mon,i));
  const t=todayStr(),vis=visible(true);
  document.getElementById('periodLabel').innerHTML=`<span style='color:#fff;font-size:11px;font-weight:500'>week ${weekNum(mon)}</span> <span style='color:var(--border)'>|</span> ${days[0].getDate()} – ${days[6].getDate()} ${MONTHS_NL[days[6].getMonth()]}`;
  let h='<div class="week-grid">';
  h+='<div class="week-header-cell" style="text-align:left;padding-left:6px"></div>';
  days.forEach(d=>{
    const isT=ds(d)===t;
    h+=`<div class="week-header-cell${isT?' today-hdr':''}" style="position:relative">${DAYS_NL[d.getDay()].toUpperCase()}<span class="day-num">${d.getDate()}</span>${isT?'<span class="today-overlay today-overlay-top"></span>':''}</div>`;
  });
  vis.forEach(name=>{
    const shifts=ROSTER[name]||{};
    h+=`<div class="name-cell">${name.split(' ')[0]}</div>`;
    days.forEach(d=>{
      const dstr=ds(d),shift=shifts[dstr],isT=dstr===t;
      const isLast=vis.indexOf(name)===vis.length-1;
      const tc=isT?(isLast?' today-col today-col-last':' today-col'):'';
      const ov=isT?`<span class="today-overlay${isLast?' today-overlay-last':''}"></span>`:'';
      const hasNote=shift&&NOTES[name]&&NOTES[name][dstr];
      const noteDot=hasNote?'<span style="position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 16px 16px 0;border-color:transparent #111 transparent transparent;z-index:11;pointer-events:none"></span><span style="position:absolute;top:1px;right:1px;width:5px;height:5px;border-radius:50%;background:#FFD700;z-index:12;pointer-events:none"></span>':'';
      const clickAttr=shift?`onclick="showShift('${name.replace(/'/g,"\\'")}',' ${dstr}','${shift}')" style="position:relative;cursor:pointer"`:'style="position:relative"';
      h+=`<div class="shift-cell${tc}" ${clickAttr}>${shift?badge(shift):''}${ov}${noteDot}</div>`;
    });
  });
  h+='</div>';
  document.getElementById('mainContent').innerHTML=h;
}

/* ===== PERSONAL ===== */
function renderPersonal(){
  const person=selectedPerson||employees[0],shifts=ROSTER[person]||{},t=todayStr();
  document.getElementById('periodLabel').innerHTML=`<span style='color:#fff;font-size:16px;font-weight:700'>${person}</span>`;
    // Render sticky header into separate div
  const ph=document.getElementById('personalHeader');
  ph.style.display='block';
  ph.innerHTML=`<div style="font-size:20px;font-weight:700;color:var(--text);padding:12px 0 2px;text-align:center">${person}</div><div style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:10px">${ROLES[person]||''}</div>`;
  let h=`<div class="upcoming-list">`;
  const sortedShiftDates=Object.keys(shifts).sort();
  const firstDate=sortedShiftDates[0]||t;
  const lastDate=sortedShiftDates[sortedShiftDates.length-1]||t;
  const allDates=[];
  {let c=new Date(parseInt(firstDate.split('-')[0]),parseInt(firstDate.split('-')[1])-1,parseInt(firstDate.split('-')[2]));
   const ld=new Date(parseInt(lastDate.split('-')[0]),parseInt(lastDate.split('-')[1])-1,parseInt(lastDate.split('-')[2]));
   while(c<=ld){allDates.push(ds(c));c=addDays(c,1);}
  }
  allDates.forEach(dstr=>{
    const parts=dstr.split('-'),d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
    const shift=shifts[dstr],isT=dstr===t,s=shift?si(shift):null;
    const pn=NOTES[person]&&NOTES[person][dstr];
    if(!shift){
      h+=`<div class="upcoming-item${isT?' today-item':''}">`
        +`<span class="upcoming-date">${d.getDate()} ${MONTHS_NL[d.getMonth()]}</span>`
        +`<span class="upcoming-day">${DAYS_FULL[d.getDay()]}</span>`
        +`<span class="upcoming-time">\u2013:\u2013</span>`
        +`<span class="upcoming-shift" style="margin-left:auto"><span style="color:var(--muted);font-size:13px;font-style:italic">Rooster vrij</span></span>`
        +`</div>`;
    } else {
    h+=`<div class="upcoming-item${isT?' today-item':''}" onclick="showShift('${person.replace(/'/g,"\\'")}',' ${dstr}','${shift||''}')">
      <span class="upcoming-date">${d.getDate()} ${MONTHS_NL[d.getMonth()]}</span>
      <span class="upcoming-day">${DAYS_FULL[d.getDay()]}</span>
      <span class="upcoming-time">${s&&s.time?s.time:'–:–'}</span>
      <span class="upcoming-shift" style="margin-left:auto">${s?`<span class="ubadge" style="color:${contrastText(s.solid||'#555')};background:${s.solid||'#555'};font-weight:700;min-width:100px;text-align:center;display:inline-block">${s.label}</span>`:'–'}</span>
    </div>${pn?`<div style="font-size:11px;color:#ffdd88;padding:2px 12px 6px;font-style:italic">! ${pn}</div>`:''}`;
    }
  });
  h+='</div>';
  document.getElementById('mainContent').innerHTML=h;
  const todayEl=document.querySelector('.today-item');
  if(todayEl) setTimeout(()=>{
    const ph=document.getElementById('personalHeader');
    const tabs=document.querySelector('.tabs');
    const offset=(tabs?tabs.offsetHeight:0)+(ph?ph.offsetHeight:0);
    const top=todayEl.getBoundingClientRect().top+window.scrollY-offset;
    window.scrollTo({top,behavior:'instant'});
  },100);
}

/* ===== TEAM ===== */
function renderTeam(){
  const d=currentDate,dstr=ds(d);
  document.getElementById('periodLabel').innerHTML=`<span style='color:#fff;font-size:11px;font-weight:500'>week ${weekNum(d)}</span> <span style='color:var(--border)'>|</span> ${DAYS_NL[d.getDay()]} ${d.getDate()} ${MONTHS_NL[d.getMonth()]}`;
  const groups={o:[],mx:[],m:[],n:[],other:[],x:[],v:[],z:[]};
  employees.forEach(name=>{const shift=(ROSTER[name]||{})[dstr];if(!shift) return;const k=shift.trim().toLowerCase().replace(/\.$/,'');(groups[k]||groups.other).push({name,shift});});
  const labels={o:'Ochtend (05:45–14:15)',mx:'MX (10:30–19:00)',m:'Middag (13:45–22:15)',n:'Nacht (21:45–06:15)',other:'Overig',x:'Dagdienst (08:00–16:30)',v:'Vrij',z:'Ziek'};
  let h='',any=false;
  ['o','mx','m','n','x','other','v','z'].forEach(k=>{
    const ppl=groups[k];if(!ppl.length) return;any=true;
    h+=`<div class="team-section-label">${labels[k]}</div><div class="team-grid">`;
    ppl.forEach(({name,shift})=>{
      const ss=si(shift);
      const mxTime=(shift==='mx'||shift==='mx.')?(d.getDay()===0||d.getDay()===6?'09:00–17:30':'10:30–19:00'):ss.time;
      const tNote=NOTES[name]&&NOTES[name][dstr];
      h+=`<div class="team-card" onclick="showShift('${name.replace(/'/g,"\\'")}',' ${dstr}','${shift}')">
        <span class="tc-badge" style="color:${contrastText(ss.solid||'#555')};background:${ss.solid||'#555'};font-weight:700">${ss.short}</span>
        <div><div class="tc-name">${name.split(' ')[0]}</div>${mxTime?`<div class="tc-time">${mxTime}</div>`:''}${tNote?`<div style="font-size:10px;color:#ffdd88;font-style:italic;margin-top:2px">! ${tNote}</div>`:''}</div>
      </div>`;
    });
    h+='</div>';
  });
  if(!any) h='<div style="padding:20px;text-align:center;color:var(--muted)">Geen diensten gepland</div>';
  document.getElementById('mainContent').innerHTML=h;
}

/* ===== SHIFT POPUP ===== */
function showShift(name,dateStr,code){
  if(!code||!code.trim()) return;
  const s=si(code);if(!s) return;
  const dstr=dateStr.trim();
  const parts=dstr.split('-'),d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  document.getElementById('modalName').textContent=name;
  document.getElementById('modalDate').textContent=DAYS_NL[d.getDay()]+' '+d.getDate()+' '+MONTHS_FULL[d.getMonth()]+' '+d.getFullYear();
  document.getElementById('modalTitle').textContent=s.label;
  document.getElementById('modalTitle').style.color=s.solid||'var(--text)';
  let shiftTime=s.time||'–';
  if(code.trim().toLowerCase().replace(/\.$/,'').replace(/,$/,'') ==='mx'){const dow=d.getDay();shiftTime=(dow===0||dow===6)?'09:00–17:30':'10:30–19:00';}
  document.getElementById('modalTime').textContent=shiftTime;
  document.getElementById('modal').style.borderColor=s.solid||'var(--border)';
  const note=(NOTES[name]&&NOTES[name][dstr])||'';
  const noteEl=document.getElementById('modalNote');
  if(note){noteEl.textContent='📝 '+note;noteEl.style.display='block';}else{noteEl.textContent='';noteEl.style.display='none';}
  document.getElementById('modalRole').textContent=ROLES[name]||'';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){if(e.target===document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open');}

/* ===== DATE PICKER ===== */
let dpYear=new Date().getFullYear(),dpMonth=new Date().getMonth();
function openDatePicker(){
  dpYear=currentDate.getFullYear();dpMonth=currentDate.getMonth();
  renderDP();document.getElementById('dpOverlay').classList.add('open');
}
function closeDPOverlay(e){if(e.target===document.getElementById('dpOverlay')) document.getElementById('dpOverlay').classList.remove('open');}
function dpNav(dir){dpMonth+=dir;if(dpMonth>11){dpMonth=0;dpYear++;}if(dpMonth<0){dpMonth=11;dpYear--;}renderDP();}
function renderDP(){
  document.getElementById('dpLabel').textContent=MONTHS_FULL[dpMonth].charAt(0).toUpperCase()+MONTHS_FULL[dpMonth].slice(1)+' '+dpYear;
  const t=todayStr(),sel=ds(currentDate);
  const first=new Date(dpYear,dpMonth,1),last=new Date(dpYear,dpMonth+1,0);
  let off=first.getDay();if(off===0) off=7;off--;
  let g='';
  for(let i=0;i<off;i++) g+='<div></div>';
  for(let day=1;day<=last.getDate();day++){
    const dstr=ds(new Date(dpYear,dpMonth,day));
    const isT=dstr===t,isSel=dstr===sel;
    const bg=isSel?'var(--accent)':isT?'rgba(79,156,249,0.2)':'transparent';
    const col=isSel?'#fff':isT?'var(--accent)':'var(--text)';
    const fw=isSel||isT?'700':'400';
    g+=`<div class="dp-day" onclick="dpSelect('${dstr}')" style="background:${bg};color:${col};font-weight:${fw}">${day}</div>`;
  }
  document.getElementById('dpGrid').innerHTML=g;
}
function dpSelect(dstr){
  const parts=dstr.split('-');currentDate=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  document.getElementById('dpOverlay').classList.remove('open');render();
}

/* ===== SWIPE ===== */
(function(){
  const el=document.getElementById('mainContent');
  let x0=null,t0=null;
  el.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;t0=Date.now();},{passive:true});
  el.addEventListener('touchend',e=>{
    if(x0===null) return;
    const dx=e.changedTouches[0].clientX-x0,dt=Date.now()-t0;
    if(Math.abs(dx)>50&&dt<400&&(currentView==='team'||currentView==='week')) navigate(dx<0?1:-1);
    x0=null;
  },{passive:true});
})();

/* ===== MODE ===== */
function toggleMode(){
  const body=document.body,btn=document.getElementById('modeBtn');
  if(body.classList.contains('light')){body.classList.remove('light');btn.textContent='🌙';try{localStorage.setItem('hccc-mode','dark');}catch(e){}}
  else{body.classList.add('light');btn.textContent='☀️';try{localStorage.setItem('hccc-mode','light');}catch(e){}}
}
try{if(localStorage.getItem('hccc-mode')==='light'){document.body.classList.add('light');document.getElementById('modeBtn').textContent='☀️';}}catch(e){}

render();
(function(){const ctrl=document.querySelector(".controls");if(ctrl)ctrl.style.display=currentView==="personal"?"none":"flex";const ph2=document.getElementById("personalHeader");if(ph2)ph2.style.display=currentView==="personal"?"block":"none";const tb2=document.getElementById("todayBtn2");if(tb2)tb2.style.display=currentView==="personal"?"none":"inline-flex";})();
</script>
