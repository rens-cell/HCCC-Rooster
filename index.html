<style>
:root {
  --bg:#d8dce8;--surface:#e4e7f0;--surface2:#cdd1df;--border:#b0b6c8;
  --text:#0d2254;--muted:#52586a;--accent:#2563eb;--today:#bfc8e0;
}





























*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Roboto',sans-serif;background:#000;color:var(--text);font-size:13px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;position:fixed;width:100%;}
#app-shell{background:var(--bg);width:100%;max-width:430px;height:100vh;overflow-y:auto;overflow-x:hidden;position:relative;box-shadow:0 0 40px rgba(0,0,0,0.6);-webkit-overflow-scrolling:touch;}

/* NAV */
.tabs{background:#0d2254;border-bottom:none;display:flex;align-items:center;padding:8px 10px;padding-top:calc(8px + env(safe-area-inset-top));gap:8px;position:sticky;top:0;z-index:100;max-width:430px;}
.tab{flex:1;padding:12px 4px;border:none;background:#FFC000;color:#0d2254;font-size:14px;font-weight:700;cursor:pointer;border-radius:0;font-family:inherit;text-align:center;display:flex;align-items:center;justify-content:center;}
.tab.active{color:#FFC000;background:#0d2254;border:none;font-weight:700;}
#todayBtn{background:none;border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:8px;font-size:16px;cursor:pointer;line-height:1;flex-shrink:0;}

/* CONTROLS */
.controls{padding:0;display:flex;align-items:stretch;gap:0;background:#0d2254;border-bottom:3px solid #FFC000;min-height:70px;position:sticky;z-index:99;}
.nav-group{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.nav-btn{background:#FFC000;border:none;color:#0d2254;border-radius:0;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;aspect-ratio:1;padding:0;}
.period-label{font-weight:700;font-size:16px;cursor:pointer;user-select:none;color:#fff;line-height:1.2;display:flex;flex-direction:column;justify-content:center;white-space:nowrap;}
.filter-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:7px;font-size:11px;font-family:inherit;cursor:pointer;max-width:140px;margin-left:auto;}

/* CONTENT */
.content{padding:10px;padding-bottom:calc(10px + env(safe-area-inset-bottom));overflow-x:hidden;}

/* WEEK */
.week-grid{display:grid;grid-template-columns:minmax(60px,max-content) repeat(7,1fr);border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.week-header-cell{background:#0d2254;padding:3px 2px;text-align:center;font-size:13px;font-weight:700;color:#ffffff;text-transform:uppercase;border-right:1px solid #1a3a7a;border-bottom:1px solid #1a3a7a;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.week-header-cell.today-hdr{background:#0d2254;color:#FFC000;font-size:13px;font-weight:700;}
.day-num{display:block;font-size:13px;font-weight:600;color:#ffffff;margin-top:0;text-transform:none;}
.today-hdr .day-num{color:#FFC000;}
.name-cell{background:var(--surface);padding:3px 8px;font-size:14px;font-weight:700;color:#0d2254;border-right:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;white-space:nowrap;}
.shift-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);height:30px;aspect-ratio:auto;display:flex;align-items:center;justify-content:center;background:var(--surface);position:relative;overflow:hidden;}
.shift-badge{display:flex;align-items:center;justify-content:center;width:calc(100% - 8px);height:calc(100% - 8px);font-size:11px;font-family:'Roboto Mono',monospace;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.25);border-radius:6px;position:relative;overflow:hidden;}
.today-overlay{display:none;}



.today-col-overlay{
  position:absolute;
  pointer-events:none;
  z-index:100;
  border:3px solid #FFC000;
  border-radius:4px;
  box-shadow:0 0 0 1.5px #0d2254;
}

/* PERSONAL */
.stats-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;flex:1;min-width:60px;text-align:center;}
.stat-num{font-size:18px;font-weight:600;font-family:'DM Mono',monospace;}
.stat-label{font-size:10px;color:var(--muted);margin-top:1px;}
.upcoming-list{display:flex;flex-direction:column;gap:5px;}
.upcoming-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:6px;flex-wrap:nowrap;cursor:pointer;}
.upcoming-item.today-item{border-color:var(--accent);background:var(--today);}
.upcoming-date{font-size:14px;width:58px;flex-shrink:0;color:#0d2254;font-weight:400;}
.today-item .upcoming-date{color:var(--accent);font-weight:600;}
.upcoming-day{font-size:14px;color:#0d2254;width:80px;flex-shrink:0;font-weight:400;}
.upcoming-shift{flex:1;}
.upcoming-time{font-size:14px;color:#0d2254;font-weight:400;min-width:80px;text-align:left;flex-shrink:0;}
.ubadge{display:inline-block;border-radius:5px;padding:5px 12px;font-size:14px;font-weight:700;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.25);}

/* TEAM */
.team-section-label{font-size:17px;font-weight:700;color:var(--text);margin-bottom:8px;margin-top:14px;padding:6px 0 4px;border-bottom:1px solid var(--border);}
.team-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.team-card{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 10px;min-width:140px;max-width:calc(50% - 6px);flex:1;cursor:pointer;min-height:48px;overflow:hidden;}
.tc-badge{border-radius:6px;padding:6px 12px;font-size:16px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0;}
.tc-name{font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
.tc-time{font-size:12px;color:#ffffff;margin-top:2px;}


/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;width:88%;max-width:340px;}
.modal-close{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:4px;}

/* DATE PICKER */
.dp-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;align-items:center;justify-content:center;}
.dp-overlay.open{display:flex;}
.dp-modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;width:300px;max-width:92vw;}
.dp-day{cursor:pointer;padding:7px 2px;border-radius:6px;font-size:13px;text-align:center;}
.dp-day:hover{background:var(--surface2);}
</style>
</head>

<div id="app-shell">
<div class="tabs" style="background:#FFC000!important;display:flex;align-items:stretch;padding:0;gap:0;position:sticky;top:0;z-index:100;">

  <button class="tab" onclick="setView('week',this)" style="background:#FFC000;color:#0d2254;flex:1;padding:12px 4px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">Week</button>
  <button class="tab" onclick="setView('personal',this)" style="background:#FFC000;color:#0d2254;flex:1;padding:12px 4px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">Diensten</button>

</div>

<div id="personalHeader" style="display:none;background:#0d2254;padding:0 10px 10px;border-bottom:2px solid #FFC000;position:sticky;top:44px;z-index:90"></div>
<div id="personalHeader" style="display:none;background:#0d2254;padding:0 10px 10px;border-bottom:2px solid #FFC000;position:sticky;top:44px;z-index:90"></div>
<div class="content" id="mainContent"></div>

</div>

<!-- SHIFT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div id="modalDate" style="font-size:15px;font-weight:400;color:#0d2254;margin-bottom:12px"></div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">
      <div id="modalBadge" style="width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;font-family:'Roboto Mono',monospace;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.25)"></div>
      <div>
        <div id="modalName" style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px"></div>

      </div>
    </div>
    <div id="modalTitle" style="font-size:22px;font-weight:700;margin-bottom:6px"></div>
    <div id="modalTime" style="font-size:15px;color:#0d2254;margin-bottom:14px"></div>
    <div id="modalNote" style="font-size:13px;color:#cc0000;margin-bottom:8px;font-style:italic;display:none"></div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">Sluiten</button>
  </div>
</div>

<!-- DATE PICKER -->

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button onclick="dpNav(-1)" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:7px;font-size:18px;cursor:pointer">&#8249;</button>
      <div id="dpLabel" style="font-size:15px;font-weight:600;color:var(--text)"></div>
      <button onclick="dpNav(1)" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:7px;font-size:18px;cursor:pointer">&#8250;</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;margin-bottom:4px">
      <div style="font-size:10px;color:var(--muted);padding:3px">Ma</div><div style="font-size:10px;color:var(--muted);padding:3px">Di</div>

    </div>
    <div id="dpGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px"></div>

  </div>
</div>

function monday(d){const day=d.getDay(),r=new Date(d);r.setDate(d.getDate()+(day===0?-6:1-day));return r;}
function weekNum(d){
  const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-(t.getDay()+6)%7);
  const w=new Date(t.getFullYear(),0,4);
  return 1+Math.round(((t-w)/86400000-3+(w.getDay()+6)%7)/7);
}
function si(code){
  if(!code) return null;
  const c=code.trim().toLowerCase().replace(/\.$/,'').replace(/,$/,'');
  return SHIFTS[c]||{label:code,short:code.slice(0,3).toUpperCase(),solid:'#555555',bold:true,time:''};
}
function hexLuma(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 0.299*r+0.587*g+0.114*b;}
function contrastText(hex){return hexLuma(hex)>140?'#111111':'#ffffff';}
function badge(code){
  const s=si(code);if(!s) return '';
  const bg=s.solid||'#555',fg=contrastText(bg);
  const ls=s.spacing!==undefined?s.spacing+'px':'0.5px';

      h+=`<div class="shift-cell${tc}" style="${rowBg}" ${clickAttr}>${shift?badge(shift):''}${ov}${noteDot}</div>`;

  requestAnimationFrame(()=>{
    try{
      const grid=document.querySelector('.week-grid');
      if(!grid) return;
      ['todayColOverlay','todayColOverlay2'].forEach(id=>{const e=document.getElementById(id);if(e)e.remove();});
      const hdrCell=grid.querySelector('.today-hdr');
      const shiftCells=Array.from(grid.querySelectorAll('.today-col,.today-col-last'));
      if(!hdrCell&&!shiftCells.length) return;
      const gridRect=grid.getBoundingClientRect();
      grid.style.position='relative';

      if(shiftCells.length){
        const r2=shiftCells[0].getBoundingClientRect();
        const r3=shiftCells[shiftCells.length-1].getBoundingClientRect();
        const d2=document.createElement('div');
        d2.id='todayColOverlay2';
        d2.style.cssText='position:absolute;pointer-events:none;z-index:100;border:3px solid #0d2254;border-top:none;border-radius:0 0 4px 4px;';

}

    </div>${pn?`<div style="font-size:11px;color:#cc0000;padding:2px 12px 6px;font-style:italic">! ${pn}</div>`:''}`;

  h+='</div>';

function parseTime(str){
  if(!str) return null;
  const p=str.split(':');
  return parseInt(p[0])*60+parseInt(p[1]);
}
function isShiftActive(shiftCode){
  const s=si(shiftCode);
  if(!s||!s.time) return false;
  const parts=s.time.split('–');
  if(parts.length!==2) return false;
  const now=new Date();
  const cur=now.getHours()*60+now.getMinutes();
  const start=parseTime(parts[0]);
  let end=parseTime(parts[1]);
  if(end<start) end+=24*60; // overnight shift (e.g. nacht)
  let c=cur;
  if(end<start&&c<start) c+=24*60; // adjust for overnight
  return c>=start&&c<end;
}

/* ===== SHIFT POPUP ===== */
function showShift(name,dateStr,code){
  if(!code||!code.trim()) return;
  const s=si(code);if(!s) return;
  const dstr=dateStr.trim();
  const parts=dstr.split('-'),d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  document.getElementById('modalName').textContent=name;
  const mb=document.getElementById('modalBadge');if(mb&&s){mb.textContent=s.short;mb.style.background=s.solid||'#555';mb.style.color=contrastText(s.solid||'#555');}else if(mb){mb.style.background='#ccc';mb.textContent='?';}
  document.getElementById('modalDate').textContent=DAYS_FULL[d.getDay()].charAt(0).toUpperCase()+DAYS_FULL[d.getDay()].slice(1)+' '+d.getDate()+' '+MONTHS_FULL[d.getMonth()]+' '+d.getFullYear();
  document.getElementById('modalTitle').textContent=s.label;
  document.getElementById('modalTitle').style.color=s.solid||'var(--text)';
  let shiftTime=s.time||'–';
  if(code.trim().toLowerCase().replace(/\.$/,'').replace(/,$/,'') ==='mx'){const dow=d.getDay();shiftTime=(dow===0||dow===6)?'09:00–17:30':'10:30–19:00';}
  document.getElementById('modalTime').textContent=shiftTime;
  document.getElementById('modal').style.borderColor=s.solid||'var(--border)';
  const note=(NOTES[name]&&NOTES[name][dstr])||'';
  const noteEl=document.getElementById('modalNote');
  if(note){noteEl.textContent=note;noteEl.style.display='block';}else{noteEl.textContent='';noteEl.style.display='none';}
  document.getElementById('modalRole').textContent=ROLES[name]||'';
  document.getElementById('modalOverlay').classList.add('open');
}

function renderDP(){
  document.getElementById('dpLabel').textContent=MONTHS_FULL[dpMonth].charAt(0).toUpperCase()+MONTHS_FULL[dpMonth].slice(1)+' '+dpYear;
  const t=todayStr(),sel=ds(currentDate);
  const first=new Date(dpYear,dpMonth,1),last=new Date(dpYear,dpMonth+1,0);
  let off=first.getDay();if(off===0) off=7;off--;
  let g='';
  for(let i=0;i<off;i++) g+='<div></div>';
  for(let day=1;day<=last.getDate();day++){
    const dstr=ds(new Date(dpYear,dpMonth,day));
    const isT=dstr===t,isSel=dstr===sel;
    const bg=isSel?'var(--accent)':isT?'rgba(79,156,249,0.2)':'transparent';
    const col=isSel?'#fff':isT?'var(--accent)':'var(--text)';
    const fw=isSel||isT?'700':'400';
    g+=`<div class="dp-day" onclick="dpSelect('${dstr}')" style="background:${bg};color:${col};font-weight:${fw}">${day}</div>`;
  }
  document.getElementById('dpGrid').innerHTML=g;
}
function dpSelect(dstr){
  const parts=dstr.split('-');currentDate=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
